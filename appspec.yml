version: 0.0
os: linux
hooks:
  ApplicationStop:
   - location: scripts/stop_docker.sh
     timeout: 30
     runas: ec2-user

  BeforeInstall:
    - location: scripts/get_files_from_docker.sh
      timeout: 30
      runas: ec2-user
  
  AfterInstall:
    - location: scripts/restart_docker.sh
      timeout: 50
      runas: ec2-user