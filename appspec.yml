version: 0.1
os: linux
hooks:
  ApplicationStop:
   - location: scripts/stop_docker.sh
     timeout: 30
     runas: root

  BeforeInstall:
    - location: scripts/get_files_from_docker.sh
      timeout: 30
      runas: root
  
  AfterInstall:
    - location: scripts/restart_docker.sh
      timeout: 50
      runas: root