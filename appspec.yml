version: 0.0
os: linux
files:
  - source: /
    destination: /home/ec2-user/test-jenkins

file_exists_behavior: OVERWRITE
hooks:
  
  BeforeInstall:
    - location: scripts/get_files_from_docker.sh
      timeout: 300
      runas: root
  AfterInstall:
    - location: scripts/restart_docker.sh
      timeout: 300
      runas: root
